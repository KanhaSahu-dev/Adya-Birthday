<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday Adya 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  padding:0;
  overflow-x:hidden;
  background:#0b0615;
  color:white;
  font-family:'DM Sans',sans-serif;
  scroll-behavior:smooth;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle at center,#2b0d3a,#0b0615 60%);
  position:relative;
}

h1{
  font-family:'Dancing Script',cursive;
  font-size:clamp(3rem,10vw,7rem);
  background:linear-gradient(90deg,#ffd166,#ff4d6d);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:fadeUp 1.2s ease forwards;
}

p{
  font-family:'Playfair Display',serif;
  font-size:1.2rem;
  opacity:.8;
  margin-top:10px;
  animation:fadeUp 1.8s ease forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:none}
}

/* SECTIONS */
section{
  padding:100px 20px;
  max-width:900px;
  margin:auto;
  text-align:center;
}

.card{
  background:rgba(255,255,255,.05);
  padding:30px;
  border-radius:20px;
  margin:30px 0;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.1);
  transform:translateY(60px);
  opacity:0;
  transition:all 1s cubic-bezier(.22,1,.36,1);
}

.card.in{
  transform:none;
  opacity:1;
}

/* FOOTER */
footer{
  text-align:center;
  padding:60px 20px;
  font-family:'Dancing Script',cursive;
  font-size:2.5rem;
  opacity:.7;
}

/* CONFETTI */
#confetti{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
}

/* HEART FLOAT */
@keyframes floatUp{
  to{transform:translateY(-80px);opacity:0}
}
@keyframes sparkleFade{
  to{opacity:0;transform:scale(2)}
}
</style>
</head>

<body>

<audio id="bg-music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<canvas id="confetti"></canvas>

<div class="hero">
  <h1>Happy Birthday Adya 🎂</h1>
  <p>You deserve every beautiful thing in this universe ✨</p>
</div>

<section>
  <div class="card">You are grace, kindness and magic in one soul 🌸</div>
  <div class="card">May this year bring smiles that never fade 💛</div>
  <div class="card">Stay the wonderful person you are, always 🌟</div>
</section>

<footer>
  Made with ❤️ for Adya
</footer>

<script>
// MUSIC ON FIRST TAP
const music = document.getElementById('bg-music');
function startMusic(){
  music.play().catch(()=>{});
  window.removeEventListener('click', startMusic);
  window.removeEventListener('touchstart', startMusic);
}
window.addEventListener('click', startMusic);
window.addEventListener('touchstart', startMusic);

// REVEAL CARDS
const io = new IntersectionObserver(e=>{
  e.forEach(x=>{
    if(x.isIntersecting) x.target.classList.add('in');
  });
},{threshold:.2});
document.querySelectorAll('.card').forEach(c=>io.observe(c));

// CONFETTI
const cf = document.getElementById('confetti');
const ctx = cf.getContext('2d');
cf.width = innerWidth;
cf.height = innerHeight;
let pieces=[];
for(let i=0;i<120;i++){
  pieces.push({
    x:Math.random()*cf.width,
    y:Math.random()*cf.height-cf.height,
    r:Math.random()*6+3,
    d:Math.random()*100
  });
}
function draw(){
  ctx.clearRect(0,0,cf.width,cf.height);
  ctx.fillStyle="white";
  pieces.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=3;
    if(p.y>cf.height)p.y=-10;
  });
}
setInterval(draw,20);

// HEARTS ON TAP
document.addEventListener('click',e=>{
  let h=document.createElement('div');
  h.innerHTML='💖';
  h.style.position='fixed';
  h.style.left=e.clientX+'px';
  h.style.top=e.clientY+'px';
  h.style.fontSize='20px';
  h.style.animation='floatUp 1s ease forwards';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
});

// SPARKLE TRAIL
document.addEventListener('mousemove',e=>{
  let s=document.createElement('div');
  s.style.position='fixed';
  s.style.left=e.clientX+'px';
  s.style.top=e.clientY+'px';
  s.style.width='6px';
  s.style.height='6px';
  s.style.background='gold';
  s.style.borderRadius='50%';
  s.style.pointerEvents='none';
  s.style.animation='sparkleFade .6s linear forwards';
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),600);
});
</script>

</body>
</html>
